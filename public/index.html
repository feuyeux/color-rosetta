<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Rosetta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%23b08d57' stroke-width='3'/><circle cx='50' cy='20' r='8' fill='%23FF0000'/><circle cx='76' cy='35' r='8' fill='%23FFFF00'/><circle cx='76' cy='65' r='8' fill='%2300FF00'/><circle cx='50' cy='80' r='8' fill='%2300FFFF'/><circle cx='24' cy='65' r='8' fill='%230000FF'/><circle cx='24' cy='35' r='8' fill='%23FF00FF'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Noto+Naskh+Arabic:wght@400;500;700&family=Noto+Sans+Devanagari:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=6">
</head>
<body>
    <div id="page-container" class="container">
        <h1 id="page-title">Color Rosetta</h1>

        <div id="main-layout" class="main-layout">
            <div id="sidebar" class="sidebar">
                <div id="lang-buttons" class="language-buttons">
                    <button class="lang-btn active" data-lang="zh">Chinese</button>
                    <button class="lang-btn" data-lang="en">English</button>
                    <button class="lang-btn" data-lang="fr">Français</button>
                    <button class="lang-btn" data-lang="es">Español</button>
                    <button class="lang-btn" data-lang="ru">Русский</button>
                    <button class="lang-btn" data-lang="el">Ελληνικά</button>
                    <button class="lang-btn" data-lang="hi">हिन्दी</button>
                    <button class="lang-btn" data-lang="ar">العربية</button>
                    <button class="lang-btn" data-lang="ja">日本語</button>
                    <button class="lang-btn" data-lang="ko">한국어</button>
                </div>

                <div id="engine-selector" class="tts-engine-selector">
                    <label for="ttsStatus">TTS engine</label>
                    <button class="engine-btn" data-engine="gemini">Gemini</button>
                    <button class="engine-btn active" data-engine="edge">Edge-TTS</button>
                </div>

                <div id="info-panel" class="info">
                    <div id="ttsStatus" class="tts-status" aria-live="polite">Ready</div>
                    <div id="selectedColor"></div>
                </div>
            </div>

            <div id="wheel-container" class="wheel-container">
                <svg id="colorWheel" viewBox="-250 -250 500 500"></svg>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/app.js?v=4"></script>
</body>
</html>
